<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AquaDex — Faune & Flore Subaquatique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#0a84ff;--green:#34c759;--gold:#f59e0b;--bg:#f5f7fa;--white:#fff;--text:#1a2332;--muted:#a0aab4;--border:#e9ecef}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text)}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:60px;position:relative}
/* HEADER */
.header{position:sticky;top:0;z-index:10;background:rgba(245,247,250,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:13px 20px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:24px}
.logo-title{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;color:var(--text);letter-spacing:-.4px}
.logo-sub{font-size:10px;color:var(--muted)}
.obs-count{font-size:13px;font-weight:800;color:var(--green)}
.obs-count span{color:#ced4da;font-weight:400}
.obs-label{font-size:9px;color:var(--muted);text-align:right}
.filter-btn{width:38px;height:38px;border-radius:12px;border:none;cursor:pointer;font-size:16px;background:var(--border);color:#495057;position:relative;display:flex;align-items:center;justify-content:center;transition:all .2s}
.filter-btn.active{background:#fff8e6;color:var(--gold);box-shadow:0 0 0 1.5px #f59e0b66}
.filter-badge{position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:var(--gold);color:#fff;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center}
/* PROGRESS */
.progress{height:3px;background:var(--border)}
.progress-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,#34c759,#30d158);transition:width .5s}
/* STATS */
.stats{display:flex;gap:10px;padding:12px 16px 8px}
.stat-card{flex:1;padding:7px 5px;border-radius:12px;text-align:center}
.stat-card .icon{font-size:14px}
.stat-card .val{font-size:9px;font-weight:700;margin-top:1px;line-height:1.3}
/* SEARCH */
.search-wrap{position:relative;margin:6px 16px 10px}
.search-wrap .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.35;pointer-events:none}
.search-input{width:100%;padding:10px 34px;background:var(--white);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:border-color .2s}
.search-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(10,132,255,.12)}
.search-input::placeholder{color:#ced4da}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:#e9ecef;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:11px;font-weight:700;color:#495057;display:flex;align-items:center;justify-content:center}
/* CHIPS */
.chips{display:flex;gap:6px;padding:0 16px 10px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px;background:#e8f0fe;border:1px solid #c5d5f8;color:var(--blue);font-weight:600}
.chip button{background:none;border:none;color:var(--blue);cursor:pointer;font-size:12px;padding:0;opacity:.7;line-height:1}
/* COUNT */
.count{padding:0 16px 10px;font-size:11px;color:var(--muted)}
/* GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:0 16px}
/* CARD */
.card{position:relative;overflow:hidden;background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:0 0 11px;cursor:pointer;display:flex;flex-direction:column;transition:all .18s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 5px rgba(0,0,0,.05);-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.96)}
.card:hover{border-color:#b8d4f8;box-shadow:0 4px 18px rgba(10,132,255,.1);transform:translateY(-1px)}
.card-obs-bar{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#34c759,#30d158);z-index:2}
.card-badges{position:absolute;top:8px;right:8px;display:flex;gap:3px;align-items:center;z-index:2}
.badge-obs{background:#34c759;border-radius:20px;padding:1px 5px;font-size:8px;font-weight:800;color:#fff}
/* PHOTO */
.card-photo{width:100%;height:110px;overflow:hidden;background:#f0f2f5;position:relative;flex-shrink:0}
.card-photo img{width:100%;height:100%;object-fit:cover;transition:opacity .3s}
.card-photo .photo-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px}
.card-photo .photo-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#f0f2f5}
.spinner{width:20px;height:20px;border:2.5px solid #d1d9e0;border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* CARD CONTENT */
.card-body{padding:9px 11px 0}
.card-num{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:1px;margin-bottom:1px}
.card-name{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;line-height:1.2;margin-bottom:2px;color:var(--text)}
.card-sci{font-size:9px;color:var(--muted);font-style:italic;margin-bottom:4px}
.card-statut{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:2px 8px;align-self:flex-start;margin-bottom:6px}
.card-statut-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.card-statut-text{font-size:8px;font-weight:600}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-groupe{font-size:8px;font-weight:600;color:#8a9baa;text-transform:uppercase;max-width:60%;line-height:1.2}
.dots{display:flex;gap:3px}
.dot{width:6px;height:6px;border-radius:50%}
/* DETAIL OVERLAY */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.3);backdrop-filter:blur(8px);display:flex;align-items:flex-end;opacity:0;transition:opacity .25s;pointer-events:none}
.overlay.show{opacity:1;pointer-events:all}
.detail{width:100%;max-height:92vh;overflow-y:auto;background:var(--bg);border-radius:24px 24px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,.15);transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);scrollbar-width:none}
.detail::-webkit-scrollbar{display:none}
.overlay.show .detail{transform:translateY(0)}
/* DETAIL HERO */
.detail-hero{width:100%;height:240px;position:relative;overflow:hidden;border-radius:24px 24px 0 0;background:#f0f2f5;flex-shrink:0}
.detail-hero img{width:100%;height:100%;object-fit:cover}
.detail-hero-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:90px}
.detail-hero-gradient{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 45%,rgba(245,247,250,1) 100%)}
.detail-hero-text{position:absolute;bottom:12px;left:16px;right:56px}
.detail-hero-name{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--text);line-height:1.1}
.detail-hero-sci{font-size:13px;color:var(--muted);font-style:italic;margin-top:3px}
.detail-hero-credit{position:absolute;bottom:10px;right:14px;font-size:9px;color:var(--muted)}
.detail-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.85);border:.5px solid var(--border);color:#495057;font-size:14px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center}
.detail-handle{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:36px;height:4px;border-radius:4px;background:rgba(0,0,0,.12)}
/* DETAIL CONTENT */
.detail-body{padding:14px 20px 40px}
.detail-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;align-items:center}
.badge-statut{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:4px 10px;border-radius:20px}
.badge-protege{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;background:#fff8e1;border:1px solid #f0c040;color:#a07800;padding:3px 10px;border-radius:20px}
.badge-tag{font-size:11px;padding:3px 10px;border-radius:20px;background:#eef2f7;color:#4a6080;font-weight:500}
.detail-desc{font-size:14px;line-height:1.7;color:#495057;margin-bottom:18px}
.detail-stats{background:var(--white);border-radius:16px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 8px rgba(0,0,0,.06);border:1px solid var(--border)}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid #f1f3f5;font-size:13px}
.stat-row:last-child{border-bottom:none}
.stat-row .label{color:var(--muted)}
.stat-row .value{color:var(--text);font-weight:600;text-align:right;max-width:58%}
.doris-link{display:block;text-align:center;padding:12px;border-radius:14px;background:#eef6ff;border:1px solid #c5ddf8;color:var(--blue);font-size:13px;font-weight:600;text-decoration:none;margin-bottom:12px;letter-spacing:.2px;transition:background .2s}
.doris-link:hover{background:#dbeafe}
.obs-btn{width:100%;padding:14px;border-radius:14px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;transition:all .2s}
.obs-btn.not-observed{background:var(--green);color:#fff;box-shadow:0 4px 20px rgba(52,199,89,.35)}
.obs-btn.observed{background:#f0fdf4;border:1.5px solid #86efac;color:#16a34a}
/* FILTER DRAWER */
.drawer-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.2);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .22s}
.drawer-overlay.show{opacity:1;pointer-events:all}
.drawer{position:absolute;top:0;right:0;bottom:0;width:85%;max-width:340px;background:var(--bg);box-shadow:-8px 0 32px rgba(0,0,0,.1);padding:0 0 40px;overflow-y:auto;scrollbar-width:none;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.drawer::-webkit-scrollbar{display:none}
.drawer-overlay.show .drawer{transform:translateX(0)}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:22px 20px 18px}
.drawer-title{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;color:var(--text)}
.drawer-close{width:32px;height:32px;border-radius:50%;background:var(--border);border:none;color:#495057;font-size:14px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center}
.filter-section{margin-bottom:20px}
.filter-label{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:0 20px;margin-bottom:8px}
.pills{display:flex;gap:6px;padding:0 20px;flex-wrap:wrap}
.pill{padding:6px 13px;border-radius:20px;border:none;cursor:pointer;font-size:11.5px;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .15s}
.pill.active{background:var(--blue);color:#fff;font-weight:700}
.pill:not(.active){background:var(--border);color:#495057}
.drawer-divider{height:1px;background:var(--border);margin:4px 20px 16px}
.toggle-btn{width:calc(100% - 40px);margin:0 20px 10px;padding:11px 14px;border-radius:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;transition:all .18s;border:1.5px solid var(--border);background:#f8f9fa;color:#495057}
.toggle-btn.active-green{border-color:rgba(52,199,89,.4);background:rgba(52,199,89,.08);color:var(--green)}
.toggle-btn.active-gold{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.08);color:var(--gold)}
.toggle-track{width:36px;height:20px;border-radius:20px;position:relative;transition:background .2s;flex-shrink:0}
.toggle-thumb{position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.reset-btn{width:calc(100% - 40px);margin:12px 20px 0;padding:10px;border-radius:12px;cursor:pointer;background:transparent;color:var(--muted);font-size:12px;font-family:'DM Sans',sans-serif;border:1.5px solid var(--border)}
/* EMPTY */
.empty{grid-column:span 2;text-align:center;color:#ced4da;padding:40px 0;font-size:14px}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <span class="logo-icon">🌊</span>
      <div>
        <div class="logo-title">AquaDex</div>
        <div class="logo-sub" id="logo-sub">Faune & Flore · 91 espèces</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="text-align:right">
        <div class="obs-count"><span id="obs-count">0</span> / <span id="total-count">91</span></div>
        <div class="obs-label">observées</div>
      </div>
      <button class="filter-btn" id="filter-btn" onclick="openDrawer()">⚙
        <span class="filter-badge" id="filter-badge" style="display:none">0</span>
      </button>
    </div>
  </header>

  <!-- PROGRESS -->
  <div class="progress"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card" style="background:#f0fdf4;border:1px solid #bbf7d0">
      <div class="icon">👁</div>
      <div class="val" style="color:#34c759" id="stat-obs">0 observées</div>
    </div>
    <div class="stat-card" style="background:#fffbeb;border:1px solid #fde68a">
      <div class="icon">🛡️</div>
      <div class="val" style="color:#f59e0b" id="stat-protege">0/29 protég.</div>
    </div>
    <div class="stat-card" style="background:#eff6ff;border:1px solid #bfdbfe">
      <div class="icon">📚</div>
      <div class="val" style="color:#0a84ff" id="stat-total">91 espèces</div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input class="search-input" id="search" placeholder="Rechercher une espèce…" oninput="render()">
    <button class="search-clear" id="search-clear" style="display:none" onclick="clearSearch()">✕</button>
  </div>

  <!-- CHIPS -->
  <div class="chips" id="chips"></div>

  <!-- COUNT -->
  <div class="count" id="count">91 espèces affichées</div>

  <!-- GRID -->
  <div class="grid" id="grid"></div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="overlay" onclick="closeDetail(event)">
  <div class="detail" id="detail">
    <div class="detail-hero" id="detail-hero">
      <div class="detail-handle"></div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
      <div class="detail-hero-gradient"></div>
      <div class="detail-hero-text">
        <div class="detail-hero-name" id="d-name"></div>
        <div class="detail-hero-sci" id="d-sci"></div>
      </div>
      <div class="detail-hero-credit" id="d-credit"></div>
    </div>
    <div class="detail-body">
      <div class="detail-badges" id="d-badges"></div>
      <div class="detail-desc" id="d-desc"></div>
      <div class="detail-stats" id="d-stats"></div>
      <a class="doris-link" id="d-doris" target="_blank" rel="noreferrer">Voir la fiche sur DORIS →</a>
      <button class="obs-btn" id="d-obs-btn" onclick="toggleObserved()"></button>
    </div>
  </div>
</div>

<!-- FILTER DRAWER -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer(event)">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-header">
      <div class="drawer-title">Filtres</div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="filter-section">
      <div class="filter-label">Groupe taxonomique</div>
      <div class="pills" id="pills-groupe"></div>
    </div>
    <div class="filter-section">
      <div class="filter-label">Zone géographique</div>
      <div class="pills" id="pills-zone"></div>
    </div>
    <div class="filter-section">
      <div class="filter-label">Habitat</div>
      <div class="pills" id="pills-habitat"></div>
    </div>
    <div class="drawer-divider"></div>
    <button class="toggle-btn" id="toggle-protege" onclick="toggleFilter('protege')">
      <span>🛡️ Espèces protégées</span>
      <div class="toggle-track" id="track-protege" style="background:#ced4da">
        <div class="toggle-thumb" id="thumb-protege" style="left:2px"></div>
      </div>
    </button>
    <button class="toggle-btn" id="toggle-obs" onclick="toggleFilter('obs')">
      <span>👁 Mes observations</span>
      <div class="toggle-track" id="track-obs" style="background:#ced4da">
        <div class="toggle-thumb" id="thumb-obs" style="left:2px"></div>
      </div>
    </button>
    <button class="reset-btn" onclick="resetFilters()">Réinitialiser tous les filtres</button>
  </div>
</div>

function wikiUrl(sci) {
  const page = WIKI[sci];
  if (!page) return null;
  return `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(page)}`;
}

// Cache photos
const photoCache = {};

async function getPhoto(sci) {
  if (photoCache[sci] !== undefined) return photoCache[sci];
  const url = wikiUrl(sci);
  if (!url) { photoCache[sci] = null; return null; }
  try {
    const r = await fetch(url);
    const d = await r.json();
    const thumb = d?.thumbnail?.source;
    const big = thumb ? thumb.replace(/\/\d+px-/, "/500px-") : null;
    photoCache[sci] = big;
    return big;
  } catch {
    photoCache[sci] = null;
    return null;
  }
}

  {id:42,nom:"Étoile de mer rouge",sci:"Echinaster sepositus",groupe:"Échinodermes",zone:"Méditerranée",habitat:"Roches & Herbiers",prof:"0–250 m",taille:"jusqu'à 30 cm",statut:"LC",protege:false,emoji:"⭐",color:"#e74c3c",tags:["Régénération","Prédateur","5 bras"],difficulte:1,description:"L'étoile de mer rouge extroverse son estomac pour digérer ses proies bivalves de l'extérieur. Elle peut régénérer un bras entier perdu."},
  {id:43,nom:"Ophiure",sci:"Ophiura spp.",groupe:"Échinodermes",zone:"Méditerranée & Atlantique",habitat:"Roches & Fonds",prof:"0–500 m",taille:"jusqu'à 20 cm",statut:"LC",protege:false,emoji:"⭐",color:"#7f8c8d",tags:["Bras serpentins","Nocturne","Charognard"],difficulte:2,description:"Les ophiures ou étoiles fragiles ont des bras serpentins très mobiles. Elles se nourrissent de détritus et de plancton. Elles se cassent facilement si on les manipule."},
  {id:44,nom:"Oursin violet",sci:"Paracentrotus lividus",groupe:"Échinodermes",zone:"Méditerranée & Atlantique",habitat:"Roches & Herbiers",prof:"0–30 m",taille:"jusqu'à 7 cm",statut:"LC",protege:false,emoji:"🟣",color:"#8e44ad",tags:["Piquants","Herbivore","Brouteur"],difficulte:1,description:"L'oursin violet broute les algues avec sa mâchoire (lanterne d'Aristote). Il peut se creuser des loges dans les rochers. Ses gonades sont très appréciées en gastronomie méditerranéenne."},
  {id:45,nom:"Holothurie",sci:"Holothuria spp.",groupe:"Échinodermes",zone:"Méditerranée",habitat:"Fonds sableux & Roches",prof:"0–100 m",taille:"jusqu'à 40 cm",statut:"LC",protege:false,emoji:"🥒",color:"#8b6914",tags:["Détritivore","Éviscération","Sable"],difficulte:2,description:"L'holothurie ingère le sédiment pour en extraire la matière organique. En cas de stress, elle peut éjecter ses organes internes pour distraire le prédateur, puis les régénère."},
  {id:46,nom:"Comatule",sci:"Antedon mediterranea",groupe:"Échinodermes",zone:"Méditerranée",habitat:"Roches & Gorgones",prof:"5–200 m",taille:"jusqu'à 20 cm",statut:"LC",protege:false,emoji:"🌿",color:"#e8834a",tags:["Bras plumeux","Filtreur","Mobile"],difficulte:2,description:"La comatule peut se déplacer en nageant par battement de ses bras plumeux. Elle se fixe aux gorgones pour filtrer le plancton."},
  {id:47,nom:"Ascidie rouge",sci:"Halocynthia papillosa",groupe:"Tuniciers",zone:"Méditerranée",habitat:"Roches & Grottes",prof:"5–100 m",taille:"jusqu'à 12 cm",statut:"LC",protege:false,emoji:"🔴",color:"#e74c3c",tags:["Fixé","Filtreur","Solitaire"],difficulte:2,description:"L'ascidie rouge est un tunicier solitaire reconnaissable à son corps rouge vif charnu. Malgré son apparence, elle est phylogénétiquement proche des vertébrés."},
  {id:48,nom:"Ascidie coloniale",sci:"Pseudodistoma crucigaster",groupe:"Tuniciers",zone:"Méditerranée",habitat:"Roches & Parois",prof:"5–60 m",taille:"colonie jusqu'à 20 cm",statut:"LC",protege:false,emoji:"🟡",color:"#f1c40f",tags:["Colonial","Fixé","Gélatineux"],difficulte:2,description:"Les ascidies coloniales forment des masses gélatineuses colorées tapissant les parois rocheuses. Certaines espèces présentent des couleurs remarquables, du jaune vif au bleu électrique."},
  {id:49,nom:"Requin renard",sci:"Alopias vulpinus",groupe:"Élasmobranches",zone:"Méditerranée & Atlantique",habitat:"Eaux pélagiques",prof:"0–500 m",taille:"jusqu'à 600 cm",statut:"VU",protege:true,emoji:"🦈",color:"#566573",tags:["Queue longue","Pélagique","Menacé"],difficulte:5,description:"Le requin renard se distingue par sa queue caudale pouvant égaler la longueur de son corps. Il l'utilise pour assommer ses proies. De nombreuses espèces de requins sont menacées par la surpêche."},
  {id:50,nom:"Raie manta",sci:"Mobula birostris",groupe:"Élasmobranches",zone:"Méditerranée & Atlantique",habitat:"Eaux pélagiques",prof:"0–1000 m",taille:"jusqu'à 700 cm",statut:"VU",protege:true,emoji:"🦅",color:"#1a5276",tags:["Filtreur","Géant","Intelligent"],difficulte:4,description:"La raie manta est le plus grand élasmobranches avec un empan pouvant atteindre 7 m. Elle peut se reconnaître dans un miroir, signe d'une intelligence sociale évoluée."},
  {id:51,nom:"Raie pastenague",sci:"Dasyatis pastinaca",groupe:"Élasmobranches",zone:"Méditerranée & Atlantique",habitat:"Fonds sableux",prof:"0–200 m",taille:"jusqu'à 140 cm",statut:"VU",protege:false,emoji:"🟤",color:"#7f8c8d",tags:["Venimeux","Benthique","Sable"],difficulte:2,description:"La raie pastenague se dissimule dans le sable. Son dard venimeux est utilisé uniquement en autodéfense. Elle détecte ses proies via ses ampules de Lorenzini."},
  {id:52,nom:"Roussette",sci:"Scyliorhinus canicula",groupe:"Élasmobranches",zone:"Méditerranée & Atlantique",habitat:"Fonds sableux & Roches",prof:"5–100 m",taille:"jusqu'à 100 cm",statut:"LC",protege:false,emoji:"🦈",color:"#b7950b",tags:["Ovipare","Benthique","Commun"],difficulte:1,description:"La roussette est l'un des requins les plus communs en Méditerranée. Elle pond des œufs dans des capsules cornées translucides (bourses à sirènes). Inoffensive pour l'homme."},
  {id:53,nom:"Sar commun",sci:"Diplodus sargus",groupe:"Poissons osseux",zone:"Méditerranée & Atlantique",habitat:"Roches & Herbiers",prof:"0–50 m",taille:"jusqu'à 45 cm",statut:"LC",protege:false,emoji:"🐟",color:"#5d6d7e",tags:["Argenté","Herbivore","Commun"],difficulte:1,description:"Le sar commun est très commun sur nos côtes. Reconnaissable à sa robe argentée et sa tache noire à la base de la queue, il vit en bancs semi-pélagiques."},
  {id:54,nom:"Sar à tête noire",sci:"Diplodus vulgaris",groupe:"Poissons osseux",zone:"Méditerranée & Atlantique",habitat:"Roches & Herbiers",prof:"0–60 m",taille:"jusqu'à 40 cm",statut:"LC",protege:false,emoji:"🐟",color:"#566573",tags:["Argenté","Bandes","Grégaire"],difficulte:1,description:"Le sar à tête noire se reconnaît à ses deux bandes noires caractéristiques. Comme les autres sars, il est hermaphrodite protogyne (d'abord femelle, puis mâle)."},
  {id:55,nom:"Sar à museau pointu",sci:"Diplodus puntazzo",groupe:"Poissons osseux",zone:"Méditerranée & Atlantique",habitat:"Roches & Herbiers",prof:"5–60 m",taille:"jusqu'à 60 cm",statut:"LC",protege:false,emoji:"🐟",color:"#7f8c8d",tags:["Museau pointu","Herbivore"],difficulte:2,description:"Le sar à museau pointu se distingue par son profil allongé et son museau effilé. Il broie les algues dures et les invertébrés fixés aux rochers."},
  {id:56,nom:"Sar tambour",sci:"Diplodus cervinus",groupe:"Poissons osseux",zone:"Méditerranée & Atlantique",habitat:"Roches",prof:"5–80 m",taille:"jusqu'à 55 cm",statut:"LC",protege:false,emoji:"🐟",color:"#717d7e",tags:["Bandes larges","Grégaire"],difficulte:2,description:"Le sar tambour porte 4 à 5 larges bandes verticales sombres sur fond argenté. C'est le plus grand des sars méditerranéens."},
  {id:57,nom:"Oblade",sci:"Oblada melanura",groupe:"Poissons osseux",zone:"Méditerranée & Atlantique",habitat:"Roches & Herbiers",prof:"0–30 m",taille:"jusqu'à 30 cm",statut:"LC",protege:false,emoji:"🐟",color:"#85929e",tags:["Tache noire","Grégaire","Pélagique"],difficulte:1,description:"L'oblade est reconnaissable à sa tache noire cerclée de blanc à la base de la queue. C'est l'un des poissons les plus visibles en Méditerranée."},
  {id:58,nom:"Corb",sci:"Sciaena umbra",groupe:"Poissons osseux",zone:"Méditerranée",habitat:"Roches & Épaves",prof:"5–200 m",taille:"jusqu'à 70 cm",statut:"VU",protege:false,emoji:"🐟",color:"#2c3e50",tags:["Nocturne","Sons","Grégaire"],difficulte:3,description:"Le corb produit des sons grondants grâce à une vessie natatoire particulière. Il vit en petits groupes dans les zones rocheuses profondes et autour des épaves."},
  {id:59,nom:"Dorade royale",sci:"Sparus aurata",groupe:"Poissons osseux",zone:"Méditerranée & Atlantique",habitat:"Herbiers & Roches",prof:"0–150 m",taille:"jusqu'à 70 cm",statut:"LC",protege:false,emoji:"🐟",color:"#d4ac0d",tags:["Bande dorée","Hermaphrodite","Emblématique"],difficulte:2,description:"La dorade royale porte une bande dorée caractéristique entre les yeux. C'est une espèce hermaphrodite protandre, d'abord mâle puis femelle."},
  {id:60,nom:"Denti",sci:"Dentex dentex",groupe:"Poissons osseux",zone:"Méditerranée",habitat:"Roches & Fonds",prof:"10–200 m",taille:"jusqu'à 100 cm",statut:"VU",protege:false,emoji:"🐟",color:"#2980b9",tags:["Prédateur","Solitaire","Bleu"],difficulte:3,description:"Le denti est un prédateur imposant des fonds rocheux méditerranéens. Il vit en bancs étant jeune puis devient solitaire et territorial à maturité."},
  {id:61,nom:"Loup (Bar)",sci:"Dicentrarchus labrax",groupe:"Poissons osseux",zone:"Méditerranée & Atlantique",habitat:"Côtier & Herbiers",prof:"0–100 m",taille:"jusqu'à 100 cm",statut:"LC",protege:false,emoji:"🐟",color:"#7f8c8d",tags:["Prédateur","Côtier","Populaire"],difficulte:2,description:"Le loup ou bar est un prédateur côtier très populaire en pêche sportive. Nocturne et crépusculaire, il peut résister aux courants et vivre en eau saumâtre."},
  {id:62,nom:"Mulet",sci:"Mugil cephalus",groupe:"Poissons osseux",zone:"Méditerranée & Atlantique",habitat:"Côtier & Eaux saumâtres",prof:"0–50 m",taille:"jusqu'à 75 cm",statut:"LC",protege:false,emoji:"🐟",color:"#85929e",tags:["Herbivore","Côtier","Bancs"],difficulte:1,description:"Le mulet ou muge est un poisson côtier grégaire. Il se nourrit d'algues microscopiques en raclant le fond. Très tolérant à la salinité variable, il remonte souvent dans les estuaires."},
  {id:63,nom:"Carangue",sci:"Caranx spp.",groupe:"Poissons osseux",zone:"Eaux tropicales",habitat:"Récifs & Eaux pélagiques",prof:"0–100 m",taille:"jusqu'à 100 cm",statut:"LC",protege:false,emoji:"🐟",color:"#2980b9",tags:["Pélagique","Bancs","Chasseur"],difficulte:2,description:"Les carangues sont des prédateurs pélagiques très rapides chassant en bancs coordonnés. Elles encerclent leurs proies en utilisant des techniques de chasse sophistiquées."},
  {id:64,nom:"Barracuda",sci:"Sphyraena viridensis",groupe:"Poissons osseux",zone:"Méditerranée & Atlantique",habitat:"Côtier & Pélagique",prof:"0–100 m",taille:"jusqu'à 165 cm",statut:"LC",protege:false,emoji:"🐟",color:"#566573",tags:["Prédateur","Dents","Curieux"],difficulte:2,description:"Le barracuda méditerranéen est un prédateur élancé aux dents acérées. Curieux et parfois intimidant, il suit souvent les plongeurs. Les attaques sur les humains sont extrêmement rares."},
  {id:65,nom:"Apogon (Cardinal)",sci:"Apogon imberbis",groupe:"Poissons osseux",zone:"Méditerranée",habitat:"Grottes & Parois",prof:"10–200 m",taille:"jusqu'à 15 cm",statut:"LC",protege:false,emoji:"🔴",color:"#c0392b",tags:["Rouge","Nocturne","Incubation buccale"],difficulte:2,description:"Le cardinal est un petit poisson rouge vif des grottes méditerranéennes. Le mâle incube les œufs dans sa bouche jusqu'à l'éclosion."},
  {id:66,nom:"Anthias",sci:"Anthias anthias",groupe:"Poissons osseux",zone:"Méditerranée",habitat:"Parois & Grottes",prof:"30–200 m",taille:"jusqu'à 27 cm",statut:"LC",protege:false,emoji:"🔴",color:"#e74c3c",tags:["Rouge","Harem","Hermaphrodite"],difficulte:3,description:"L'anthias forme des harems colorés sur les parois rocheuses méditerranéennes profondes. Si le mâle dominant meurt, la femelle dominante change de sexe."},
  {id:67,nom:"Serran écriture",sci:"Serranus scriba",groupe:"Poissons osseux",zone:"Méditerranée & Atlantique",habitat:"Roches & Herbiers",prof:"1–150 m",taille:"jusqu'à 36 cm",statut:"LC",protege:false,emoji:"🐠",color:"#c0392b",tags:["Hermaphrodite simultané","Coloré"],difficulte:2,description:"Le serran écriture est hermaphrodite simultané. Sa robe est très caractéristique avec des lignes rouges verticales et une tache bleue sur le ventre."},
  {id:68,nom:"Rouget",sci:"Mullus surmuletus",groupe:"Poissons osseux",zone:"Méditerranée & Atlantique",habitat:"Fonds sableux & Roches",prof:"5–100 m",taille:"jusqu'à 40 cm",statut:"LC",protege:false,emoji:"🔴",color:"#e74c3c",tags:["Barbillons","Benthique","Apprécié"],difficulte:1,description:"Le rouget fouille le sable avec ses deux barbillons sensoriels sous la mâchoire pour détecter crustacés et vers enfouis."},
  {id:69,nom:"Girelle commune",sci:"Coris julis",groupe:"Poissons osseux",zone:"Méditerranée & Atlantique",habitat:"Roches & Herbiers",prof:"0–120 m",taille:"jusqu'à 25 cm",statut:"LC",protege:false,emoji:"🐠",color:"#e67e22",tags:["Dimorphisme","Coloré","Nettoyeur"],difficulte:1,description:"La girelle présente un remarquable dimorphisme sexuel. Elle est hermaphrodite protogyne et passe la nuit enfouie dans le sable."},
  {id:70,nom:"Crénilabre paon",sci:"Symphodus tinca",groupe:"Poissons osseux",zone:"Méditerranée",habitat:"Roches & Herbiers",prof:"0–30 m",taille:"jusqu'à 44 cm",statut:"LC",protege:false,emoji:"🐠",color:"#1abc9c",tags:["Coloré","Nid","Herbiers"],difficulte:2,description:"Le crénilabre paon construit un nid d'algues qu'il garde jalousement et oxygène en ventilant avec ses nageoires pectorales."},
  {id:71,nom:"Castagnole",sci:"Chromis chromis",groupe:"Poissons osseux",zone:"Méditerranée",habitat:"Roches & Parois",prof:"0–40 m",taille:"jusqu'à 16 cm",statut:"LC",protege:false,emoji:"🐟",color:"#2c3e50",tags:["Grégaire","Plancton","Noir-gris"],difficulte:1,description:"La castagnole vit en bancs denses au-dessus des rochers méditerranéens. Les juvéniles ont une livrée bleue électrique très vive qui disparaît avec l'âge."},
  {id:72,nom:"Blennie",sci:"Blennius spp.",groupe:"Poissons osseux",zone:"Méditerranée & Atlantique",habitat:"Roches littorales",prof:"0–15 m",taille:"jusqu'à 20 cm",statut:"LC",protege:false,emoji:"🐠",color:"#7b6534",tags:["Littoral","Curieux","Cornes"],difficulte:1,description:"Les blennies sont de petits poissons benthiques très curieux et peu farouches. Elles s'appuient sur leurs nageoires pelviennes pour marcher sur les rochers."},
  {id:73,nom:"Triptérygion",sci:"Tripterygion spp.",groupe:"Poissons osseux",zone:"Méditerranée & Atlantique",habitat:"Parois & Grottes",prof:"0–30 m",taille:"jusqu'à 9 cm",statut:"LC",protege:false,emoji:"🔴",color:"#e74c3c",tags:["Petit","3 nageoires dorsales","Coloré"],difficulte:2,description:"Le triptérygion est un minuscule poisson dont le mâle arbore une tête rouge vif en période de reproduction. Il vit collé aux parois rocheuses ombrées, souvent la tête en bas."},
  {id:74,nom:"Tacaud",sci:"Trisopterus luscus",groupe:"Poissons osseux",zone:"Atlantique",habitat:"Roches & Épaves",prof:"5–300 m",taille:"jusqu'à 46 cm",statut:"LC",protege:false,emoji:"🐟",color:"#c8a96e",tags:["Atlantique","Bancs","Bandes"],difficulte:1,description:"Le tacaud est un petit gadidé atlantique vivant en bancs denses autour des rochers et épaves. Il se reconnaît à ses trois nageoires dorsales distinctes."},
  {id:75,nom:"Chapon (Rascasse rouge)",sci:"Scorpaena scrofa",groupe:"Poissons osseux",zone:"Méditerranée & Atlantique",habitat:"Roches & Fonds",prof:"20–500 m",taille:"jusqu'à 50 cm",statut:"LC",protege:false,emoji:"🔴",color:"#e74c3c",tags:["Venimeux","Camouflage","Embuscade"],difficulte:2,description:"Le chapon est un redoutable chasseur à l'affût. Il se camoufle parfaitement grâce à ses appendices cutanés. Ses épines dorsales portent un venin pouvant causer de vives douleurs."},
  {id:76,nom:"Rascasse pustuleuse",sci:"Scorpaena porcus",groupe:"Poissons osseux",zone:"Méditerranée & Atlantique",habitat:"Roches & Herbiers",prof:"0–50 m",taille:"jusqu'à 25 cm",statut:"LC",protege:false,emoji:"🟤",color:"#7d6608",tags:["Venimeux","Camouflage","Littoral"],difficulte:1,description:"La rascasse pustuleuse est plus petite et plus commune que le chapon. Ses épines dorsales venimeuses peuvent causer de douloureuses piqûres."},
  {id:77,nom:"Poisson-scorpion",sci:"Scorpaenidae spp.",groupe:"Poissons osseux",zone:"Indo-Pacifique",habitat:"Récifs coralliens",prof:"1–40 m",taille:"jusqu'à 35 cm",statut:"LC",protege:false,emoji:"🔴",color:"#c0392b",tags:["Venimeux","Lionfish","Invasif"],difficulte:2,description:"Les poissons-scorpions tropicaux (lionfish) sont parmi les plus venimeux de l'océan. Certaines espèces sont devenues envahissantes en Méditerranée et en Atlantique occidental."},
  {id:78,nom:"Poisson-ange",sci:"Pomacanthidae spp.",groupe:"Poissons osseux",zone:"Eaux tropicales",habitat:"Récifs coralliens",prof:"5–80 m",taille:"jusqu'à 60 cm",statut:"LC",protege:false,emoji:"💛",color:"#f1c40f",tags:["Coloré","Récif","Territorial"],difficulte:2,description:"Les poissons-anges sont parmi les plus colorés des récifs coralliens. Ils présentent souvent des motifs différents entre juvéniles et adultes."},
  {id:79,nom:"Baliste",sci:"Balistidae spp.",groupe:"Poissons osseux",zone:"Eaux tropicales",habitat:"Récifs coralliens",prof:"5–50 m",taille:"jusqu'à 75 cm",statut:"LC",protege:false,emoji:"🐡",color:"#e67e22",tags:["Dents puissantes","Épine","Récif"],difficulte:2,description:"Le baliste peut bloquer son épine dorsale dans les fissures pour se protéger. Sa mâchoire très puissante lui permet de broyer coraux et oursins."},
  {id:80,nom:"Poisson-chirurgien",sci:"Acanthuridae spp.",groupe:"Poissons osseux",zone:"Eaux tropicales",habitat:"Récifs coralliens",prof:"2–100 m",taille:"jusqu'à 40 cm",statut:"LC",protege:false,emoji:"💙",color:"#3498db",tags:["Épine tranchante","Herbivore","Coloré"],difficulte:2,description:"Le poisson-chirurgien porte une épine tranchante rétractable à la base de la queue. Herbivore, il broute les algues des récifs, jouant un rôle essentiel dans l'équilibre de l'écosystème."},
  {id:81,nom:"Poisson-perroquet",sci:"Scaridae spp.",groupe:"Poissons osseux",zone:"Eaux tropicales",habitat:"Récifs coralliens",prof:"0–30 m",taille:"jusqu'à 120 cm",statut:"LC",protege:false,emoji:"🦜",color:"#2ecc71",tags:["Bec","Sable","Herbivore"],difficulte:2,description:"Le poisson-perroquet broie les coraux avec son bec formé de dents fusionnées. Il s'enveloppe chaque nuit dans un cocon de mucus qui masque son odeur aux prédateurs."},
  {id:82,nom:"Poisson-papillon",sci:"Chaetodontidae spp.",groupe:"Poissons osseux",zone:"Eaux tropicales",habitat:"Récifs coralliens",prof:"1–20 m",taille:"jusqu'à 30 cm",statut:"LC",protege:false,emoji:"🦋",color:"#f39c12",tags:["Coloré","Couple","Corallien"],difficulte:2,description:"Les poissons-papillons vivent souvent en couples fidèles sur les récifs coralliens. Ils sont d'excellents indicateurs de la santé des récifs."},
  {id:83,nom:"Poisson-rasoir",sci:"Aeoliscus strigatus",groupe:"Poissons osseux",zone:"Indo-Pacifique",habitat:"Récifs coralliens",prof:"2–30 m",taille:"jusqu'à 15 cm",statut:"LC",protege:false,emoji:"🔪",color:"#95a5a6",tags:["Vertical","Camouflage","Oursin"],difficulte:3,description:"Le poisson-rasoir nage en position verticale, tête en bas, parmi les épines des oursins. Son corps ultra-comprimé le rend pratiquement invisible."},
  {id:84,nom:"Hippocampe pygmée",sci:"Hippocampus bargibanti",groupe:"Poissons osseux",zone:"Indo-Pacifique",habitat:"Gorgones",prof:"16–40 m",taille:"moins de 2 cm",statut:"VU",protege:true,emoji:"🐴",color:"#e056b0",tags:["Minuscule","Gorgone","Mimétique"],difficulte:5,description:"L'hippocampe pygmée est l'un des plus petits poissons du monde, mesurant moins de 2 cm. Il est parfaitement mimétique des gorgones sur lesquelles il vit."},
  {id:85,nom:"Poisson-fantôme",sci:"Solenostomus paradoxus",groupe:"Poissons osseux",zone:"Indo-Pacifique",habitat:"Gorgones & Herbiers",prof:"3–25 m",taille:"jusqu'à 12 cm",statut:"LC",protege:false,emoji:"👻",color:"#9b59b6",tags:["Mimétique","Feuille","Fragile"],difficulte:4,description:"Le poisson-fantôme imite parfaitement une feuille morte ou un fragment d'algue flottant. C'est la femelle qui incube les œufs dans une poche formée par ses nageoires."},
  {id:86,nom:"Poisson-fantôme d'herbier",sci:"Solenostomus cyanopterus",groupe:"Poissons osseux",zone:"Indo-Pacifique",habitat:"Herbiers & Algues",prof:"2–15 m",taille:"jusqu'à 17 cm",statut:"LC",protege:false,emoji:"🌿",color:"#27ae60",tags:["Mimétique","Herbier","Camouflage"],difficulte:4,description:"Le poisson-fantôme d'herbier se confond parfaitement avec les feuilles de posidonies. Il nage tête en bas et aspire de minuscules crustacés avec son museau en pipette."},
  {id:87,nom:"Tortue caouane",sci:"Caretta caretta",groupe:"Reptiles",zone:"Méditerranée",habitat:"Eaux côtières & Pélagiques",prof:"0–200 m",taille:"jusqu'à 120 cm",statut:"VU",protege:true,emoji:"🐢",color:"#8b6914",tags:["Protégée","Migratrice","Longévité"],difficulte:3,description:"La tortue caouane est la tortue marine la plus commune en Méditerranée. Elle revient toujours sur la plage où elle est née pour pondre. Menacée par les filets de pêche et les plastiques."},
  {id:88,nom:"Serpent marin",sci:"Hydrophiinae spp.",groupe:"Reptiles",zone:"Indo-Pacifique",habitat:"Eaux côtières",prof:"0–100 m",taille:"jusqu'à 150 cm",statut:"LC",protege:false,emoji:"🐍",color:"#1abc9c",tags:["Venimeux","Apnée","Tropical"],difficulte:3,description:"Les serpents marins plongent en apnée comme tous les reptiles. Leur venin est souvent plus puissant que celui des serpents terrestres. Malgré cela, ils sont généralement peu agressifs."},
  {id:89,nom:"Dauphin commun",sci:"Delphinus delphis",groupe:"Mammifères marins",zone:"Méditerranée & Atlantique",habitat:"Eaux pélagiques",prof:"0–300 m",taille:"jusqu'à 230 cm",statut:"EN",protege:true,emoji:"🐬",color:"#3498db",tags:["Cétacé","Écholocation","Social"],difficulte:3,description:"Le dauphin commun vit en groupes pouvant atteindre des centaines d'individus. Il utilise l'écholocation pour chasser et se repérer. En Méditerranée, la population est classée en danger."},
  {id:90,nom:"Grand dauphin",sci:"Tursiops truncatus",groupe:"Mammifères marins",zone:"Méditerranée & Atlantique",habitat:"Eaux côtières",prof:"0–300 m",taille:"jusqu'à 400 cm",statut:"LC",protege:true,emoji:"🐬",color:"#2980b9",tags:["Cétacé","Intelligent","Côtier"],difficulte:2,description:"Le grand dauphin est le cétacé le plus souvent rencontré par les plongeurs. Très intelligent et curieux, il peut s'approcher des embarcations et jouer dans les vagues de proue."},
  {id:91,nom:"Baleine bleue",sci:"Balaenoptera musculus",groupe:"Mammifères marins",zone:"Atlantique",habitat:"Eaux pélagiques",prof:"0–500 m",taille:"jusqu'à 3300 cm",statut:"EN",protege:true,emoji:"🐋",color:"#1a5276",tags:["Plus grand animal","Filtreur","Chant"],difficulte:5,description:"La baleine bleue est le plus grand animal ayant jamais existé sur Terre. Elle peut peser jusqu'à 150 tonnes. Presque exterminée par la chasse, elle est aujourd'hui strictement protégée."},
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let observed   = new Set();
let filters    = { groupe:"Tous", zone:"Toutes", habitat:"Tous", protege:false, obs:false };
let search     = "";
let currentSp  = null;

const STATUT_LABEL2 = {LC:"Préoccupation mineure",PR:"Protégée",NT:"Quasi menacée",VU:"Vulnérable",EN:"En danger",CR:"En danger critique"};

const allGroupes  = ["Tous",   ...new Set(SPECIES.map(s=>s.groupe))].filter((v,i,a)=>a.indexOf(v)===i);
const allZones    = ["Toutes", ...new Set(SPECIES.map(s=>s.zone))].filter((v,i,a)=>a.indexOf(v)===i).sort();
const allHabitats = ["Tous",   ...new Set(SPECIES.map(s=>s.habitat))].filter((v,i,a)=>a.indexOf(v)===i).sort();
const totalProtected = SPECIES.filter(s=>s.protege).length;

// ── FILTER ────────────────────────────────────────────────────────────────────
function filtered() {
  return SPECIES.filter(sp => {
    if (filters.groupe!=="Tous"   && sp.groupe!==filters.groupe)  return false;
    if (filters.zone!=="Toutes"   && sp.zone!==filters.zone)      return false;
    if (filters.habitat!=="Tous"  && sp.habitat!==filters.habitat) return false;
    if (filters.protege && !sp.protege)                            return false;
    if (filters.obs    && !observed.has(sp.id))                    return false;
    if (search) {
      const q = search.toLowerCase();
      return sp.nom.toLowerCase().includes(q) || sp.sci.toLowerCase().includes(q);
    }
    return true;
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  search = document.getElementById("search").value;
  document.getElementById("search-clear").style.display = search ? "" : "none";

  const list = filtered();
  const obsProtected = [...observed].filter(id=>SPECIES.find(s=>s.id===id)?.protege).length;
  const pct = Math.round((observed.size/SPECIES.length)*100);

  // header
  document.getElementById("obs-count").textContent = observed.size;
  document.getElementById("progress-bar").style.width = pct+"%";
  document.getElementById("stat-obs").textContent = observed.size+" observées";
  document.getElementById("stat-protege").textContent = obsProtected+"/"+totalProtected+" protég.";
  document.getElementById("count").textContent = list.length+" espèce"+(list.length!==1?"s":"")+" affichée"+(list.length!==1?"s":"");

  // filter badge
  const af = [filters.groupe!=="Tous",filters.zone!=="Toutes",filters.habitat!=="Tous",filters.protege,filters.obs].filter(Boolean).length;
  const btn = document.getElementById("filter-btn");
  const badge = document.getElementById("filter-badge");
  btn.className = "filter-btn"+(af>0?" active":"");
  badge.style.display = af>0?"flex":"none";
  badge.textContent = af;

  // chips
  const chips = document.getElementById("chips");
  chips.innerHTML = "";
  if (filters.groupe!=="Tous")   chips.innerHTML += chip(filters.groupe,  ()=>{filters.groupe="Tous";render();});
  if (filters.zone!=="Toutes")   chips.innerHTML += chip(filters.zone,    ()=>{filters.zone="Toutes";render();});
  if (filters.habitat!=="Tous")  chips.innerHTML += chip(filters.habitat, ()=>{filters.habitat="Tous";render();});
  if (filters.protege)           chips.innerHTML += chip("🛡️ Protégées",  ()=>{filters.protege=false;render();});
  if (filters.obs)               chips.innerHTML += chip("👁 Mes obs.",   ()=>{filters.obs=false;render();});

  // grid
  const grid = document.getElementById("grid");
  if (list.length===0) {
    grid.innerHTML = '<div class="empty">Aucune espèce trouvée 🌊</div>';
    return;
  }
  grid.innerHTML = list.map(sp => cardHTML(sp)).join("");

  // Lazy-load photos
  list.forEach(sp => loadCardPhoto(sp));
}

function chip(label, fn) {
  const id = "chip_"+Math.random().toString(36).slice(2);
  setTimeout(()=>{ const el=document.getElementById(id); if(el) el.onclick=fn; },0);
  return `<span class="chip" id="${id}">${label}<button onclick="event.stopPropagation()">✕</button></span>`;
}

function cardHTML(sp) {
  const sc = STATUT_COLOR[sp.statut]||"#888";
  const lbl = STATUT_LABEL2[sp.statut]||sp.statut;
  const isObs = observed.has(sp.id);
  const dots = [1,2,3,4,5].map(i=>`<div class="dot" style="background:${i<=sp.difficulte?"#0a84ff":"#d1d9e0"}"></div>`).join("");
  return `<div class="card" onclick="openDetail(${sp.id})">
    ${isObs?'<div class="card-obs-bar"></div>':""}
    <div class="card-badges">
      ${sp.protege?'<span style="font-size:11px">🛡️</span>':""}
      ${isObs?'<span class="badge-obs">✓</span>':""}
    </div>
    <div class="card-photo" id="photo-${sp.id}">
      <div class="photo-loading"><div class="spinner"></div></div>
    </div>
    <div class="card-body">
      <div class="card-num">#${String(sp.id).padStart(3,"0")}</div>
      <div class="card-name">${sp.nom}</div>
      <div class="card-sci">${sp.sci}</div>
      <div class="card-statut" style="background:${sc}14">
        <div class="card-statut-dot" style="background:${sc}"></div>
        <span class="card-statut-text" style="color:${sc}">${lbl}</span>
      </div>
      <div class="card-footer">
        <div class="card-groupe">${sp.groupe}</div>
        <div class="dots">${dots}</div>
      </div>
    </div>
  </div>`;
}

async function loadCardPhoto(sp) {
  const container = document.getElementById("photo-"+sp.id);
  if (!container) return;
  const url = await getPhoto(sp.sci);
  if (url) {
    container.innerHTML = `<img src="${url}" alt="${sp.nom}" onerror="this.parentNode.innerHTML='<div class=\\'photo-placeholder\\'>${sp.emoji}</div>'">`;
  } else {
    container.innerHTML = `<div class="photo-placeholder">${sp.emoji}</div>`;
  }
}

// ── DETAIL ────────────────────────────────────────────────────────────────────
async function openDetail(id) {
  const sp = SPECIES.find(s=>s.id===id);
  currentSp = sp;
  const sc  = STATUT_COLOR[sp.statut]||"#888";
  const lbl = STATUT_LABEL2[sp.statut]||sp.statut;
  const isObs = observed.has(sp.id);

  // hero
  const hero = document.getElementById("detail-hero");
  hero.style.background = sp.color+"18";
  document.getElementById("d-name").textContent = sp.nom;
  document.getElementById("d-sci").textContent  = sp.sci;
  document.getElementById("d-credit").textContent = "";

  // show placeholder immediately
  const existingImg = hero.querySelector("img,.detail-hero-placeholder");
  if (existingImg) existingImg.remove();
  const placeholder = document.createElement("div");
  placeholder.className = "detail-hero-placeholder";
  placeholder.textContent = sp.emoji;
  hero.insertBefore(placeholder, hero.querySelector(".detail-handle"));

  // badges
  const tags = (sp.tags||[]).map(t=>`<span class="badge-tag">${t}</span>`).join("");
  document.getElementById("d-badges").innerHTML =
    `<span class="badge-statut" style="background:${sc}18;color:${sc};border:1px solid ${sc}40">${lbl}</span>`+
    (sp.protege?`<span class="badge-protege">🛡️ Espèce protégée</span>`:"")+tags;

  document.getElementById("d-desc").textContent = sp.description;

  document.getElementById("d-stats").innerHTML = [
    ["🌊","Zone",sp.zone],["📍","Habitat",sp.habitat],
    ["⬇️","Profondeur",sp.prof],["📏","Taille",sp.taille],["🔬","Groupe",sp.groupe]
  ].map(([ic,lb,vl])=>`<div class="stat-row"><span class="label">${ic} ${lb}</span><span class="value">${vl}</span></div>`).join("");

  document.getElementById("d-doris").href = `https://doris.ffessm.fr/find/species?name=${encodeURIComponent(sp.sci)}`;

  const btn = document.getElementById("d-obs-btn");
  btn.className = "obs-btn "+(isObs?"observed":"not-observed");
  btn.textContent = isObs?"✓ Observée — retirer":"👁 J'ai observé cette espèce !";

  // show overlay
  document.getElementById("overlay").classList.add("show");
  document.body.style.overflow="hidden";

  // load photo async
  const url = await getPhoto(sp.sci);
  if (url && currentSp?.id===sp.id) {
    placeholder.remove();
    const img = document.createElement("img");
    img.alt = sp.nom;
    img.onerror = () => {
      img.remove();
      const ph = document.createElement("div");
      ph.className = "detail-hero-placeholder";
      ph.textContent = sp.emoji;
      hero.insertBefore(ph, hero.querySelector(".detail-handle"));
    };
    img.src = url;
    hero.insertBefore(img, hero.querySelector(".detail-handle"));
    document.getElementById("d-credit").textContent = "© Wikipedia CC";
  }
}

function closeDetail(e) {
  if (e && e.target!==document.getElementById("overlay")) return;
  document.getElementById("overlay").classList.remove("show");
  document.body.style.overflow="";
  currentSp = null;
}

function toggleObserved() {
  if (!currentSp) return;
  if (observed.has(currentSp.id)) observed.delete(currentSp.id);
  else observed.add(currentSp.id);
  const isObs = observed.has(currentSp.id);
  const btn = document.getElementById("d-obs-btn");
  btn.className = "obs-btn "+(isObs?"observed":"not-observed");
  btn.textContent = isObs?"✓ Observée — retirer":"👁 J'ai observé cette espèce !";
  render();
}

// ── FILTERS ────────────────────────────────────────────────────────────────────
function openDrawer() {
  buildPills("pills-groupe", allGroupes, "groupe");
  buildPills("pills-zone",   allZones,   "zone");
  buildPills("pills-habitat",allHabitats,"habitat");
  updateToggles();
  document.getElementById("drawer-overlay").classList.add("show");
  document.body.style.overflow="hidden";
}
function closeDrawer(e) {
  if (e && e.target!==document.getElementById("drawer-overlay")) return;
  document.getElementById("drawer-overlay").classList.remove("show");
  document.body.style.overflow="";
  render();
}
function buildPills(containerId, opts, key) {
  const container = document.getElementById(containerId);
  container.innerHTML = opts.map(o=>`
    <button class="pill${filters[key]===o?" active":""}" onclick="setFilter('${key}','${o}')">${o}</button>
  `).join("");
}
function setFilter(key, val) { filters[key]=val; buildPills("pills-"+key, key==="groupe"?allGroupes:key==="zone"?allZones:allHabitats, key); render(); }
function toggleFilter(key) {
  if (key==="protege") filters.protege=!filters.protege;
  else filters.obs=!filters.obs;
  updateToggles();
  render();
}
function updateToggles() {
  [["protege","gold"],["obs","green"]].forEach(([key,cls])=>{
    const btn   = document.getElementById("toggle-"+key);
    const track = document.getElementById("track-"+key);
    const thumb = document.getElementById("thumb-"+key);
    const val   = key==="protege"?filters.protege:filters.obs;
    btn.className   = "toggle-btn"+(val?" active-"+cls:"");
    track.style.background = val?(cls==="gold"?"#f59e0b":"#34c759"):"#ced4da";
    thumb.style.left = val?"18px":"2px";
  });
}
function resetFilters() {
  filters={groupe:"Tous",zone:"Toutes",habitat:"Tous",protege:false,obs:false};
  closeDrawer();
}
function clearSearch() { document.getElementById("search").value=""; render(); }

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
